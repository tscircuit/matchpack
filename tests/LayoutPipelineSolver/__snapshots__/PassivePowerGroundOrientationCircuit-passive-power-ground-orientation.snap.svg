0213" x="475.5751242645159" y="337.55760342791484" width="69.67742080367788" height="91.24424152862593" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.012055555304878047"/></g><g><rect data-type="rect" data-label="D_POWER" data-x="-6.007227674999999" data-y="-0.40000000000000124" x="264.8838756438706" y="340.0460827423318" width="44.79262765950722" height="86.26728289979178" fill="rgba(59, 130, 246, 0.12)" stroke="none" stroke-width="0.012055555304878047"/></g><g><rect data-type="rect" data-label="LED_POWER" data-x="-8.602227674999998" data-y="-0.40000000000000124" x="45.06820287036288" y="336.31336377070625" width="53.91705181236978" height="93.73272084304296" fill="rgba(168, 85, 247, 0.18)" stroke="none" stroke-width="0.012055555304878047"/></g><text data-type="text" data-label="U1" data-x="0.2972276749999997" data-y="1.1102230246251565e-16" x="810.2304137116585" y="350" fill="black" font-size="10.949308983435111" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><text data-type="text" data-label="R_PULLDOWN" data-x="-0.7027723250000003" data-y="-0.9500000000000001" x="727.2811032310894" y="428.80184495654055" fill="black" font-size="7.097172368773377" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R_PULLDOWN</text><text data-type="text" data-label="R_PULLUP" data-x="-0.7027723250000002" data-y="0.9500000000000002" x="727.2811032310896" y="271.19815504345945" fill="black" font-size="7.097172368773377" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R_PULLUP</text><text data-type="text" data-label="C_DECOUPLE" data-x="-3.317227675" data-y="-0.40000000000000213" x="510.41383466635483" y="383.1797241922278" fill="black" font-size="15.329032576809153" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C_DECOUPLE</text><text data-type="text" data-label="D_POWER" data-x="-6.007227674999999" data-y="-0.40000000000000124" x="287.2801894736242" y="383.1797241922277" fill="black" font-size="9.854378085091598" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">D_POWER</text><text data-type="text" data-label="LED_POWER" data-x="-8.602227674999998" data-y="-0.40000000000000124" x="72.02672877654777" y="383.1797241922277" fill="black" font-size="11.86175139872137" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">LED_POWER</text><g><circle data-type="point" data-label="U1.1" data-x="-0.7027723250000003" data-y="0.10000000000000009" cx="727.2811032310894" cy="341.7050689519431" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-0.7027723250000003" data-y="-0.09999999999999987" cx="727.2811032310894" cy="358.29493104805687" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3 (VSYS)" data-x="0.2972276749999997" data-y="0.7000000000000002" cx="810.2304137116585" cy="291.93548266360165" r="3" fill="black"/></g><g><circle data-type="point" data-label="R_PULLDOWN.1" data-x="-0.7027723250000002" data-y="-0.4" cx="727.2811032310896" cy="383.1797241922276" r="3" fill="black"/></g><g><circle data-type="point" data-label="R_PULLDOWN.2 (GND)" data-x="-0.7027723250000004" data-y="-1.5" cx="727.2811032310894" cy="474.4239657208535" r="3" fill="black"/></g><g><circle data-type="point" data-label="R_PULLUP.1 (VSYS)" data-x="-0.7027723250000001" data-y="1.5000000000000002" cx="727.2811032310896" cy="225.57603427914648" r="3" fill="black"/></g><g><circle data-type="point" data-label="R_PULLUP.2" data-x="-0.7027723250000003" data-y="0.40000000000000013" cx="727.2811032310894" cy="316.82027580777236" r="3" fill="black"/></g><g><circle data-type="point" data-label="C_DECOUPLE.1 (VSYS)" data-x="-3.317227675" data-y="0.1499999999999979" cx="510.41383466635483" cy="337.55760342791484" r="3" fill="black"/></g><g><circle data-type="point" data-label="C_DECOUPLE.2 (GND)" data-x="-3.317227675" data-y="-0.9500000000000022" cx="510.41383466635483" cy="428.8018449565408" r="3" fill="black"/></g><g><circle data-type="point" data-label="D_POWER.1 (VSYS)" data-x="-6.007227674999999" data-y="0.11999999999999877" cx="287.2801894736242" cy="340.0460827423318" r="3" fill="black"/></g><g><circle data-type="point" data-label="D_POWER.2 (GND)" data-x="-6.007227674999999" data-y="-0.9200000000000013" cx="287.2801894736242" cy="426.3133656421236" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED_POWER.1 (VSYS)" data-x="-8.602227674999998" data-y="0.1399999999999988" cx="72.02672877654777" cy="338.3870965327204" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED_POWER.2 (GND)" data-x="-8.602227674999998" data-y="-0.9400000000000013" cx="72.02672877654777" cy="427.97235185173497" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="700" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '700');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":82.94931048056901,"c":0,"e":785.5755830146659,"b":0,"d":-82.94931048056901,"f":350};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>