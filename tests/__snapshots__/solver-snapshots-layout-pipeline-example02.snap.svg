0000000000000012" data-type="line" data-label="" points="626.1914460285133,283.27902240325864 676.2932790224033,283.27902240325864" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="C6" data-x="-1.5150000000000001" data-y="-0.4500000000000002" x="161.9144602851324" y="283.27902240325864" width="88.51323828920576" height="183.70672097759677" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0059878048780487815"/></g><g><rect data-type="rect" data-label="C1" data-x="-1.85" data-y="0.615" x="58.37067209775972" y="153.0142566191446" width="183.70672097759677" height="88.5132382892057" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0059878048780487815"/></g><g><rect data-type="rect" data-label="C2" data-x="-2.2450000000000006" data-y="-0.4500000000000004" x="39.99999999999997" y="283.27902240325875" width="88.51323828920573" height="183.70672097759672" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0059878048780487815"/></g><g><rect data-type="rect" data-label="C5" data-x="1.85" data-y="0.10000000000000009" x="676.2932790224033" y="239.0224032586558" width="183.70672097759666" height="88.5132382892057" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0059878048780487815"/></g><g><rect data-type="rect" data-label="U1" data-x="0" data-y="0" x="358.98167006109986" y="249.87780040733196" width="200.40733197556006" height="100.20366598778003" fill="rgba(245, 158, 11, 0.18)" stroke="none" stroke-width="0.0059878048780487815"/></g><text data-type="text" data-label="C6" data-x="-1.5150000000000001" data-y="-0.4500000000000002" x="206.1710794297353" y="375.132382892057" fill="black" font-size="19.472912423625253" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C6</text><text data-type="text" data-label="C1" data-x="-1.85" data-y="0.615" x="150.2240325865581" y="197.27087576374745" fill="black" font-size="19.472912423625253" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="C2" data-x="-2.2450000000000006" data-y="-0.4500000000000004" x="84.25661914460284" y="375.1323828920571" fill="black" font-size="19.472912423625253" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><text data-type="text" data-label="C5" data-x="1.85" data-y="0.10000000000000009" x="768.1466395112017" y="283.27902240325864" fill="black" font-size="19.472912423625253" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C5</text><text data-type="text" data-label="U1" data-x="0" data-y="0" x="459.1853360488799" y="299.979633401222" fill="black" font-size="22.044806517311613" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="C6.1" data-x="-1.5150000000000001" data-y="0.09999999999999987" cx="206.1710794297353" cy="283.27902240325864" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2" data-x="-1.5150000000000001" data-y="-1.0000000000000002" cx="206.1710794297353" cy="466.9857433808554" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-2.4000000000000004" data-y="0.615" cx="58.37067209775972" cy="197.27087576374745" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2" data-x="-1.3" data-y="0.615" cx="242.0773930753565" cy="197.27087576374745" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-2.2450000000000006" data-y="0.09999999999999964" cx="84.25661914460284" cy="283.2790224032587" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2" data-x="-2.2450000000000006" data-y="-1.0000000000000004" cx="84.25661914460284" cy="466.9857433808554" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1" data-x="1.3" data-y="0.10000000000000012" cx="676.2932790224033" cy="283.27902240325864" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (GND)" data-x="2.4000000000000004" data-y="0.10000000000000006" cx="860" cy="283.27902240325864" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (VSYS)" data-x="-1" data-y="0.1" cx="292.1792260692465" cy="283.27902240325864" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (GND)" data-x="-1" data-y="-0.1" cx="292.1792260692465" cy="316.6802443991853" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="1" data-y="-0.1" cx="626.1914460285133" cy="316.6802443991853" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4 (V3_3)" data-x="1" data-y="0.1" cx="626.1914460285133" cy="283.27902240325864" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="620" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '620');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":167.00610997963338,"c":0,"e":459.1853360488799,"b":0,"d":-167.00610997963338,"f":299.979633401222};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>