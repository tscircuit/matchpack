ints="1,0.1 1.5150000000000001,0.09999999999999987" data-type="line" data-label="" points="710.9090909090909,279.41724941724937 809.3473193473194,279.41724941724937" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="C6" data-x="-1.5150000000000001" data-y="-0.4500000000000002" x="179.53379953379954" y="279.4172494172494" width="101.30536130536132" height="210.25641025641022" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005231707317073172"/></g><g><rect data-type="rect" data-label="U1" data-x="0" data-y="0" x="405.0815850815851" y="241.18881118881114" width="229.37062937062933" height="114.68531468531467" fill="rgba(245, 158, 11, 0.18)" stroke="none" stroke-width="0.005231707317073172"/></g><g><rect data-type="rect" data-label="C5" data-x="1.5150000000000001" data-y="-0.4500000000000002" x="758.6946386946388" y="279.4172494172494" width="101.30536130536132" height="210.25641025641022" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005231707317073172"/></g><g><rect data-type="rect" data-label="C2" data-x="-2.2450000000000006" data-y="-0.4500000000000004" x="39.999999999999915" y="279.4172494172494" width="101.30536130536137" height="210.25641025641028" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005231707317073172"/></g><g><rect data-type="rect" data-label="C1" data-x="-1.85" data-y="0.615" x="61.02564102564105" y="130.3263403263403" width="210.25641025641028" height="101.30536130536129" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005231707317073172"/></g><text data-type="text" data-label="C6" data-x="-1.5150000000000001" data-y="-0.4500000000000002" x="230.1864801864802" y="384.5454545454545" fill="black" font-size="22.287179487179486" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C6</text><text data-type="text" data-label="U1" data-x="0" data-y="0" x="519.7668997668998" y="298.5314685314685" fill="black" font-size="25.230769230769234" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><text data-type="text" data-label="C5" data-x="1.5150000000000001" data-y="-0.4500000000000002" x="809.3473193473194" y="384.5454545454545" fill="black" font-size="22.287179487179486" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C5</text><text data-type="text" data-label="C2" data-x="-2.2450000000000006" data-y="-0.4500000000000004" x="90.6526806526806" y="384.54545454545456" fill="black" font-size="22.287179487179486" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><text data-type="text" data-label="C1" data-x="-1.85" data-y="0.615" x="166.1538461538462" y="180.97902097902096" fill="black" font-size="22.287179487179486" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><g><circle data-type="point" data-label="C6.1" data-x="-1.5150000000000001" data-y="0.09999999999999987" cx="230.1864801864802" cy="279.41724941724937" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2" data-x="-1.5150000000000001" data-y="-1.0000000000000002" cx="230.1864801864802" cy="489.6736596736596" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (VSYS)" data-x="-1" data-y="0.1" cx="328.62470862470866" cy="279.41724941724937" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (GND)" data-x="-1" data-y="-0.1" cx="328.62470862470866" cy="317.6456876456876" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="1" data-y="-0.1" cx="710.9090909090909" cy="317.6456876456876" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4 (V3_3)" data-x="1" data-y="0.1" cx="710.9090909090909" cy="279.41724941724937" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1" data-x="1.5150000000000001" data-y="0.09999999999999987" cx="809.3473193473194" cy="279.41724941724937" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (GND)" data-x="1.5150000000000001" data-y="-1.0000000000000002" cx="809.3473193473194" cy="489.6736596736596" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-2.2450000000000006" data-y="0.09999999999999964" cx="90.6526806526806" cy="279.4172494172494" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2" data-x="-2.2450000000000006" data-y="-1.0000000000000004" cx="90.6526806526806" cy="489.6736596736597" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-2.4000000000000004" data-y="0.615" cx="61.02564102564105" cy="180.97902097902096" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2" data-x="-1.3" data-y="0.615" cx="271.2820512820513" cy="180.97902097902096" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="620" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '620');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":191.1421911421911,"c":0,"e":519.7668997668998,"b":0,"d":-191.1421911421911,"f":298.5314685314685};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>