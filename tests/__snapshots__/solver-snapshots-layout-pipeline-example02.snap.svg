ta-label="" points="579.3929712460064,292.74760383386575 631.1501597444089,292.74760383386575" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="C6" data-x="-1.35" data-y="0.2849999999999999" x="128.24281150159732" y="165.94249201277952" width="91.43769968051123" height="189.77635782747603" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005796296296296296"/></g><g><rect data-type="rect" data-label="C1" data-x="-1.35" data-y="1.2999999999999998" x="79.07348242811491" y="39.99999999999993" width="189.77635782747603" height="91.4376996805112" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005796296296296296"/></g><g><rect data-type="rect" data-label="C2" data-x="-1.35" data-y="-1.0150000000000001" x="128.24281150159732" y="390.2236421725239" width="91.43769968051123" height="189.7763578274761" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005796296296296296"/></g><g><rect data-type="rect" data-label="C5" data-x="1.85" data-y="0.10000000000000009" x="631.1501597444089" y="247.02875399361017" width="189.7763578274761" height="91.4376996805112" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005796296296296296"/></g><g><rect data-type="rect" data-label="U1" data-x="0" data-y="0" x="303.3546325878593" y="258.2428115015974" width="207.02875399361028" height="103.51437699680514" fill="rgba(245, 158, 11, 0.18)" stroke="none" stroke-width="0.005796296296296296"/></g><text data-type="text" data-label="C6" data-x="-1.35" data-y="0.2849999999999999" x="173.96166134185293" y="260.83067092651754" fill="black" font-size="20.116293929712462" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C6</text><text data-type="text" data-label="C1" data-x="-1.35" data-y="1.2999999999999998" x="173.96166134185293" y="85.71884984025553" fill="black" font-size="20.116293929712462" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="C2" data-x="-1.35" data-y="-1.0150000000000001" x="173.96166134185293" y="485.11182108626195" fill="black" font-size="20.116293929712462" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><text data-type="text" data-label="C5" data-x="1.85" data-y="0.10000000000000009" x="726.0383386581469" y="292.74760383386575" fill="black" font-size="20.116293929712462" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C5</text><text data-type="text" data-label="U1" data-x="0" data-y="0" x="406.86900958466447" y="309.99999999999994" fill="black" font-size="22.773162939297134" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="C6.1" data-x="-1.35" data-y="0.835" cx="173.96166134185293" cy="165.9424920127795" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2" data-x="-1.35" data-y="-0.2650000000000001" cx="173.96166134185293" cy="355.71884984025553" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-1.9000000000000001" data-y="1.2999999999999998" cx="79.07348242811491" cy="85.71884984025553" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2" data-x="-0.8" data-y="1.2999999999999998" cx="268.84984025559095" cy="85.71884984025553" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-1.35" data-y="-0.4650000000000001" cx="173.96166134185293" cy="390.2236421725239" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2" data-x="-1.35" data-y="-1.5650000000000002" cx="173.96166134185293" cy="580" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1" data-x="1.3" data-y="0.10000000000000012" cx="631.1501597444089" cy="292.74760383386575" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (GND)" data-x="2.4000000000000004" data-y="0.10000000000000006" cx="820.926517571885" cy="292.74760383386575" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (VSYS)" data-x="-1" data-y="0.1" cx="234.3450479233226" cy="292.74760383386575" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (GND)" data-x="-1" data-y="-0.1" cx="234.3450479233226" cy="327.25239616613413" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="1" data-y="-0.1" cx="579.3929712460064" cy="327.25239616613413" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4 (V3_3)" data-x="1" data-y="0.1" cx="579.3929712460064" cy="292.74760383386575" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="620" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '620');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":172.52396166134187,"c":0,"e":406.86900958466447,"b":0,"d":-172.52396166134187,"f":309.99999999999994};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>