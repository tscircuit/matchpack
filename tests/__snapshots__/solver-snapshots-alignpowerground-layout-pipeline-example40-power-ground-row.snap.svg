<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-3.44263985,-3.63 4.50191365,-3.63" data-type="line" data-label="" points="59.13410595800002,234.1191501128667 840.865894042,234.1191501128667" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-0.26481845000000004,-3.63 2.91300295,-3.63" data-type="line" data-label="" points="371.8268211916,234.1191501128667 684.5195364252,234.1191501128667" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><rect data-type="rect" data-label="R1" data-x="-3.44263985" data-y="-3.0799999999999996" x="39.99999999999997" y="125.88084988713334" width="38.2682119160001" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><g><rect data-type="rect" data-label="R2" data-x="-1.8537291500000002" data-y="-3.0799999999999996" x="196.3463576168" y="125.88084988713334" width="38.26821191600004" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><g><rect data-type="rect" data-label="R3" data-x="-0.2648184499999999" data-y="-3.0799999999999996" x="352.6927152336" y="125.88084988713334" width="38.2682119160001" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><g><rect data-type="rect" data-label="R4" data-x="1.3240922500000005" data-y="-3.0799999999999996" x="509.0390728504" y="125.88084988713334" width="38.2682119160001" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><g><rect data-type="rect" data-label="R5" data-x="2.91300295" data-y="-3.0799999999999996" x="665.3854304672" y="125.88084988713334" width="38.268211916000155" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><g><rect data-type="rect" data-label="R6" data-x="4.50191365" data-y="-3.0799999999999996" x="821.731788084" y="125.88084988713334" width="38.268211916000155" height="108.23830022573333" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.010162761219512194"/></g><text data-type="text" data-label="R1" data-x="-3.44263985" data-y="-3.0799999999999996" x="59.13410595800002" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="-1.8537291500000002" data-y="-3.0799999999999996" x="215.4804635748" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="-0.2648184499999999" data-y="-3.0799999999999996" x="371.8268211916" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="1.3240922500000005" data-y="-3.0799999999999996" x="528.1731788084" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><text data-type="text" data-label="R5" data-x="2.91300295" data-y="-3.0799999999999996" x="684.5195364252" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R5</text><text data-type="text" data-label="R6" data-x="4.50191365" data-y="-3.0799999999999996" x="840.865894042" y="180" fill="black" font-size="8.419006621520017" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R6</text><g><circle data-type="point" data-label="R1.1 (VCC)" data-x="-3.44263985" data-y="-2.5299999999999994" cx="59.13410595800002" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (GND)" data-x="-3.44263985" data-y="-3.63" cx="59.13410595800002" cy="234.1191501128667" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1 (VDD)" data-x="-1.8537291500000002" data-y="-2.5299999999999994" cx="215.4804635748" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (AGND)" data-x="-1.8537291500000002" data-y="-3.63" cx="215.4804635748" cy="234.1191501128667" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (V3V3)" data-x="-0.2648184499999998" data-y="-2.5299999999999994" cx="371.82682119160006" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (DGND)" data-x="-0.26481845000000004" data-y="-3.63" cx="371.8268211916" cy="234.1191501128667" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (VBUS)" data-x="1.3240922500000005" data-y="-2.5299999999999994" cx="528.1731788084" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (VSS)" data-x="1.3240922500000005" data-y="-3.63" cx="528.1731788084" cy="234.1191501128667" r="3" fill="black"/></g><g><circle data-type="point" data-label="R5.1 (V3V)" data-x="2.91300295" data-y="-2.5299999999999994" cx="684.5195364252" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R5.2 (DGND)" data-x="2.91300295" data-y="-3.63" cx="684.5195364252" cy="234.1191501128667" r="3" fill="black"/></g><g><circle data-type="point" data-label="R6.1 (V3_3)" data-x="4.50191365" data-y="-2.5299999999999994" cx="840.865894042" cy="125.88084988713337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R6.2 (GND)" data-x="4.50191365" data-y="-3.63" cx="840.865894042" cy="234.1191501128667" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="360" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '360');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":98.3984547506666,"c":0,"e":397.8845474610667,"b":0,"d":-98.3984547506666,"f":-123.06724063205309};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>