<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-0.38891069999999983,-1.1274999999999997 -1.1778213999999998,-1.1274999999999997" data-type="line" data-label="" points="226.07749453658803,284.0737800487656 76.79582422764676,284.0737800487656" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="1.9778214000000003,-1.1274999999999997 1.1889107000000005,-1.1274999999999997" data-type="line" data-label="" points="673.9225054634119,284.0737800487656 524.6408351544707,284.0737800487656" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><rect data-type="rect" data-label="R1" data-x="-0.3889106999999997" data-y="-0.5774999999999997" x="189.28167030894127" y="75.92621995123437" width="73.59164845529358" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><g><rect data-type="rect" data-label="R2" data-x="0.40000000000000013" data-y="-0.5774999999999997" x="338.56334061788255" y="75.92621995123437" width="73.59164845529358" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><g><rect data-type="rect" data-label="R3" data-x="1.9778214000000003" data-y="-0.5774999999999997" x="637.1266812357651" y="75.92621995123437" width="73.59164845529358" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><g><rect data-type="rect" data-label="R4" data-x="2.7667321" data-y="-0.5774999999999997" x="786.4083515447064" y="75.92621995123437" width="73.59164845529358" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><g><rect data-type="rect" data-label="R5" data-x="1.1889107000000005" data-y="-0.5774999999999997" x="487.8450109268239" y="75.92621995123437" width="73.59164845529358" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><g><rect data-type="rect" data-label="R6" data-x="-1.1778213999999998" data-y="-0.5774999999999997" x="39.999999999999986" y="75.92621995123437" width="73.59164845529355" height="208.14756009753125" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00528471243902439"/></g><text data-type="text" data-label="R1" data-x="-0.3889106999999997" data-y="-0.5774999999999997" x="226.07749453658806" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="0.40000000000000013" data-y="-0.5774999999999997" x="375.35916484552934" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="1.9778214000000003" data-y="-0.5774999999999997" x="673.9225054634119" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="2.7667321" data-y="-0.5774999999999997" x="823.2041757723532" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><text data-type="text" data-label="R5" data-x="1.1889107000000005" data-y="-0.5774999999999997" x="524.6408351544707" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R5</text><text data-type="text" data-label="R6" data-x="-1.1778213999999998" data-y="-0.5774999999999997" x="76.79582422764676" y="180" fill="black" font-size="16.19016266016459" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R6</text><g><circle data-type="point" data-label="R1.1 (VCC)" data-x="-0.3889106999999996" data-y="-0.027499999999999636" cx="226.07749453658806" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (GND)" data-x="-0.38891069999999983" data-y="-1.1274999999999997" cx="226.07749453658803" cy="284.0737800487656" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1 (VDD)" data-x="0.40000000000000024" data-y="-0.027499999999999636" cx="375.35916484552934" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (AGND)" data-x="0.4" data-y="-1.1274999999999997" cx="375.35916484552934" cy="284.0737800487656" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (V3V3)" data-x="1.9778214000000003" data-y="-0.027499999999999636" cx="673.9225054634119" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (DGND)" data-x="1.9778214000000003" data-y="-1.1274999999999997" cx="673.9225054634119" cy="284.0737800487656" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (VBUS)" data-x="2.7667321" data-y="-0.027499999999999636" cx="823.2041757723532" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (VSS)" data-x="2.7667321" data-y="-1.1274999999999997" cx="823.2041757723532" cy="284.0737800487656" r="3" fill="black"/></g><g><circle data-type="point" data-label="R5.1 (V3V)" data-x="1.1889107000000005" data-y="-0.027499999999999636" cx="524.6408351544707" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R5.2 (DGND)" data-x="1.1889107000000005" data-y="-1.1274999999999997" cx="524.6408351544707" cy="284.0737800487656" r="3" fill="black"/></g><g><circle data-type="point" data-label="R6.1 (V3_3)" data-x="-1.1778213999999998" data-y="-0.027499999999999636" cx="76.79582422764676" cy="75.92621995123439" r="3" fill="black"/></g><g><circle data-type="point" data-label="R6.2 (GND)" data-x="-1.1778213999999998" data-y="-1.1274999999999997" cx="76.79582422764676" cy="284.0737800487656" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="360" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '360');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":189.2250546341193,"c":0,"e":299.6691429918816,"b":0,"d":-189.2250546341193,"f":70.72253094879618};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>