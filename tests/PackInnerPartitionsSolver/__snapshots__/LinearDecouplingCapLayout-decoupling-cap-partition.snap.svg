14244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="285.6458225495127" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C12</text></g><g><rect data-type="rect" data-label="C14" data-x="-0.36458330000000005" data-y="0" x="313.95649287784084" y="307.91298461360145" width="12.087014244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="318.95649287784084" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C14</text></g><g><rect data-type="rect" data-label="C8" data-x="1.8229164999999996" data-y="0" x="363.9224983703331" y="307.91298461360145" width="12.087014244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="368.9224983703331" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C8</text></g><g><rect data-type="rect" data-label="C13" data-x="-1.0937499" data-y="0" x="297.30115771367673" y="307.91298461360145" width="12.087014244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="302.30115771367673" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C13</text></g><g><rect data-type="rect" data-label="C15" data-x="0.3645832999999999" data-y="0" x="330.6118280420049" y="307.91298461360145" width="12.087014244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="335.6118280420049" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C15</text></g><g><rect data-type="rect" data-label="C19" data-x="1.0937498999999997" data-y="0" x="347.267163206169" y="307.91298461360145" width="12.087014244318311" height="24.174030772797096" fill="none" stroke="black" stroke-width="0.04377976142857142"/><text x="352.267163206169" y="307.91298461360145" font-family="sans-serif" dominant-baseline="text-before-edge" font-size="1.0878313505134622" fill="black">C19</text></g><text data-type="text" data-label="C12" data-x="-1.8229164999999998" data-y="0" x="286.6893296716718" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C12</text><text data-type="text" data-label="C14" data-x="-0.36458330000000005" data-y="0" x="320" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C14</text><text data-type="text" data-label="C8" data-x="1.8229164999999996" data-y="0" x="369.96600549249223" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C8</text><text data-type="text" data-label="C13" data-x="-1.0937499" data-y="0" x="303.3446648358359" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C13</text><text data-type="text" data-label="C15" data-x="0.3645832999999999" data-y="0" x="336.65533516416406" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C15</text><text data-type="text" data-label="C19" data-x="1.0937498999999997" data-y="0" x="353.3106703283282" y="320" fill="black" font-size="274.09925519074653" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C19</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":22.841604599228877,"c":0,"e":328.32766758208203,"b":0,"d":-22.841604599228877,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>