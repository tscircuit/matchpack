<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><g><circle data-type="point" data-label="C10.1 (VCC)" data-x="1.46" data-y="0" cx="320" cy="305.74074074074076" r="3" fill="black"/></g><g><circle data-type="point" data-label="C10.2 (GND)" data-x="1.46" data-y="-1.1" cx="320" cy="334.2592592592593" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (VCC)" data-x="0" data-y="0" cx="282.14814814814815" cy="305.74074074074076" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (GND)" data-x="0" data-y="-1.1" cx="282.14814814814815" cy="334.2592592592593" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.1 (GND)" data-x="0.7299999999999999" data-y="-1.1" cx="301.0740740740741" cy="334.2592592592593" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (VCC)" data-x="0.7300000000000001" data-y="0" cx="301.0740740740741" cy="305.74074074074076" r="3" fill="black"/></g><g><polyline data-points="1.46,0 0,0" data-type="line" data-label="" points="320,305.74074074074076 282.14814814814815,305.74074074074076" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><polyline data-points="1.46,0 0.7300000000000001,0" data-type="line" data-label="" points="320,305.74074074074076 301.0740740740741,305.74074074074076" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><polyline data-points="0,0 0.7300000000000001,0" data-type="line" data-label="" points="282.14814814814815,305.74074074074076 301.0740740740741,305.74074074074076" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><polyline data-points="1.46,-1.1 0,-1.1" data-type="line" data-label="" points="320,334.2592592592593 282.14814814814815,334.2592592592593" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><polyline data-points="1.46,-1.1 0.7299999999999999,-1.1" data-type="line" data-label="" points="320,334.2592592592593 301.0740740740741,334.2592592592593" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><polyline data-points="0,-1.1 0.7299999999999999,-1.1" data-type="line" data-label="" points="282.14814814814815,334.2592592592593 301.0740740740741,334.2592592592593" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/></g><g><rect data-type="rect" data-label="C10" data-x="1.46" data-y="-0.55" x="313.1296296296296" y="306.2592592592593" width="13.740740740740762" height="27.481481481481467" fill="none" stroke="black" stroke-width="0.03857142857142857"/></g><g><rect data-type="rect" data-label="C2" data-x="0" data-y="-0.55" x="275.27777777777777" y="306.2592592592593" width="13.740740740740762" height="27.481481481481467" fill="none" stroke="black" stroke-width="0.03857142857142857"/></g><g><rect data-type="rect" data-label="C3" data-x="0.73" data-y="-0.55" x="294.2037037037037" y="306.2592592592593" width="13.740740740740762" height="27.481481481481467" fill="none" stroke="black" stroke-width="0.03857142857142857"/></g><text data-type="text" data-label="C10" data-x="1.46" data-y="-0.55" x="320" y="320" fill="black" font-size="311.11111111111114" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C10</text><text data-type="text" data-label="C2" data-x="0" data-y="-0.55" x="282.14814814814815" y="320" fill="black" font-size="311.11111111111114" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><text data-type="text" data-label="C3" data-x="0.73" data-y="-0.55" x="301.0740740740741" y="320" fill="black" font-size="311.11111111111114" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C3</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":25.925925925925927,"c":0,"e":282.14814814814815,"b":0,"d":-25.925925925925927,"f":305.74074074074076};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>