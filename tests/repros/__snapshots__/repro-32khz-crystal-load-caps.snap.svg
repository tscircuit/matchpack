<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-0.55,0 -0.72,-1.22" data-type="line" data-label="" points="193.77049180327867,182.2950819672131 154.75409836065572,462.2950819672131" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="0.55,0 0.72,-1.22" data-type="line" data-label="" points="446.2295081967213,182.2950819672131 485.2459016393443,462.2950819672131" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-0.72,-1.82 0.72,-1.82" data-type="line" data-label="" points="154.75409836065572,600 485.2459016393443,600" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><rect data-type="rect" data-label="X1" data-x="0" data-y="0" x="97.37704918032784" y="40" width="445.2459016393443" height="284.5901639344262" fill="rgba(59, 130, 246, 0.12)" stroke="none" stroke-width="0.004357142857142857"/></g><g><rect data-type="rect" data-label="C1" data-x="-0.72" data-y="-1.52" x="58.36065573770489" y="462.29508196721315" width="192.78688524590166" height="137.7049180327869" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.004357142857142857"/></g><g><rect data-type="rect" data-label="C2" data-x="0.72" data-y="-1.52" x="388.8524590163935" y="462.29508196721315" width="192.7868852459016" height="137.7049180327869" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.004357142857142857"/></g><text data-type="text" data-label="X1" data-x="0" data-y="0" x="320" y="182.2950819672131" fill="black" font-size="62.609836065573774" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><text data-type="text" data-label="C1" data-x="-0.72" data-y="-1.52" x="154.75409836065572" y="531.1475409836066" fill="black" font-size="30.295081967213118" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="C2" data-x="0.72" data-y="-1.52" x="485.2459016393443" y="531.1475409836066" fill="black" font-size="30.295081967213118" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.55" data-y="0" cx="193.77049180327867" cy="182.2950819672131" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.55" data-y="0" cx="446.2295081967213" cy="182.2950819672131" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.72" data-y="-1.22" cx="154.75409836065572" cy="462.2950819672131" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="-0.72" data-y="-1.82" cx="154.75409836065572" cy="600" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.72" data-y="-1.22" cx="485.2459016393443" cy="462.2950819672131" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="0.72" data-y="-1.82" cx="485.2459016393443" cy="600" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":229.5081967213115,"c":0,"e":320,"b":0,"d":-229.5081967213115,"f":182.2950819672131};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>