<svg width="640" height="640" viewBox="0 0 640 640" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-0.55,0 -1.02,-1.22" data-type="line" data-label="" points="213.05555555555554,203.33333333333331 121.66666666666666,440.55555555555554" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="0.55,0 1.02,-1.22" data-type="line" data-label="" points="426.94444444444446,203.33333333333331 518.3333333333334,440.55555555555554" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-1.02,-1.82 1.02,-1.82" data-type="line" data-label="" points="121.66666666666666,557.2222222222222 518.3333333333334,557.2222222222222" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><rect data-type="rect" data-label="X1" data-x="0" data-y="0" x="131.3888888888889" y="82.77777777777777" width="377.2222222222222" height="241.1111111111111" fill="rgba(59, 130, 246, 0.12)" stroke="none" stroke-width="0.005142857142857143"/></g><g><rect data-type="rect" data-label="C1" data-x="-1.02" data-y="-1.52" x="40" y="440.5555555555556" width="163.33333333333331" height="116.66666666666663" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005142857142857143"/></g><g><rect data-type="rect" data-label="C2" data-x="1.02" data-y="-1.52" x="436.66666666666674" y="440.5555555555556" width="163.33333333333331" height="116.66666666666663" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.005142857142857143"/></g><text data-type="text" data-label="X1" data-x="0" data-y="0" x="320" y="203.33333333333331" fill="black" font-size="53.044444444444444" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><text data-type="text" data-label="C1" data-x="-1.02" data-y="-1.52" x="121.66666666666666" y="498.8888888888889" fill="black" font-size="25.666666666666668" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="C2" data-x="1.02" data-y="-1.52" x="518.3333333333334" y="498.8888888888889" fill="black" font-size="25.666666666666668" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C2</text><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.55" data-y="0" cx="213.05555555555554" cy="203.33333333333331" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.55" data-y="0" cx="426.94444444444446" cy="203.33333333333331" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.02" data-y="-1.22" cx="121.66666666666666" cy="440.55555555555554" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="-1.02" data-y="-1.82" cx="121.66666666666666" cy="557.2222222222222" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="1.02" data-y="-1.22" cx="518.3333333333334" cy="440.55555555555554" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="1.02" data-y="-1.82" cx="518.3333333333334" cy="557.2222222222222" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":194.44444444444446,"c":0,"e":320,"b":0,"d":-194.44444444444446,"f":203.33333333333331};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>