y="-3.7" x="270.2181202941177" y="475.8823529411766" width="59.563759411764636" height="84.11764705882348" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.013076923076923078"/></g><g><rect data-type="rect" data-label="R3" data-x="1.3789106999999992" data-y="-3.7" x="375.6642326470588" y="475.8823529411766" width="59.563759411764636" height="84.11764705882348" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.013076923076923078"/></g><text data-type="text" data-label="U1" data-x="0" data-y="0" x="300" y="235.00000000000003" fill="black" font-size="26.76470588235294" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><text data-type="text" data-label="R1" data-x="-1.378910699999999" data-y="-3.7" x="194.5538876470589" y="517.9411764705883" fill="black" font-size="13.104027070588218" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="0" data-y="-3.7" x="300" y="517.9411764705883" fill="black" font-size="13.104027070588218" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="1.3789106999999992" data-y="-3.7" x="405.4461123529411" y="517.9411764705883" fill="black" font-size="13.104027070588218" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><g><circle data-type="point" data-label="U1.1" data-x="-1.9500000000000002" data-y="-0.7000000000000001" cx="150.88235294117646" cy="288.5294117647059" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-1.9500000000000002" data-y="-0.9" cx="150.88235294117646" cy="303.82352941176475" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="1.9500000000000002" data-y="-0.85" cx="449.11764705882354" cy="300" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="1.9500000000000002" data-y="-0.2499999999999999" cx="449.11764705882354" cy="254.11764705882354" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="1.9500000000000002" data-y="-0.44999999999999996" cx="449.11764705882354" cy="269.4117647058824" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="-0.44999999999999996" data-y="2.55" cx="265.5882352941177" cy="40.00000000000006" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="-1.9500000000000002" data-y="0.7" cx="150.88235294117646" cy="181.47058823529414" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.9" data-x="0.44999999999999996" data-y="2.55" cx="334.4117647058823" cy="40.00000000000006" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.10" data-x="1.9500000000000002" data-y="0.85" cx="449.11764705882354" cy="170.00000000000003" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12" data-x="0" data-y="-2.55" cx="300" cy="430" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13" data-x="-1.9500000000000002" data-y="0.9" cx="150.88235294117646" cy="166.1764705882353" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14" data-x="1.9500000000000002" data-y="-0.6499999999999999" cx="449.11764705882354" cy="284.7058823529412" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.15" data-x="-0.65" data-y="-2.55" cx="250.29411764705884" cy="430" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.16" data-x="0.65" data-y="-2.55" cx="349.70588235294116" cy="430" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1" data-x="-1.378910699999999" data-y="-3.1500000000000004" cx="194.5538876470589" cy="475.8823529411765" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (charger_connectivity_net0)" data-x="-1.378910699999999" data-y="-4.25" cx="194.5538876470589" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="1.0103336092965664e-16" data-y="-3.1500000000000004" cx="300" cy="475.8823529411765" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="-1.0103336092965664e-16" data-y="-4.25" cx="300" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="1.3789106999999992" data-y="-3.1500000000000004" cx="405.4461123529411" cy="475.8823529411765" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="1.3789106999999992" data-y="-4.25" cx="405.4461123529411" cy="560" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":76.47058823529412,"c":0,"e":300,"b":0,"d":-76.47058823529412,"f":235.00000000000003};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>