ta-label="R1.2 (charger_connectivity_net0)" data-x="-0.9394553500000004" data-y="-4.35" cx="203.61832405797105" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="2.239455349999999" data-y="-3.25" cx="443.18840579710144" cy="477.10144927536237" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="2.239455349999999" data-y="-4.35" cx="443.18840579710144" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="0.6499999999999996" data-y="-3.25" cx="323.40336492753624" cy="477.10144927536237" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="0.6499999999999994" data-y="-4.35" cx="323.40336492753624" cy="560" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":75.3623188405797,"c":0,"e":274.4178576811595,"b":0,"d":-75.3623188405797,"f":232.1739130434783};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>