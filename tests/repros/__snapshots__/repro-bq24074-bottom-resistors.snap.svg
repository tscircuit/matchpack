></g><g><circle data-type="point" data-label="U1.4" data-x="1.9500000000000002" data-y="-0.85" cx="375.5341491228071" cy="278.5964912280702" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="1.9500000000000002" data-y="-0.2499999999999999" cx="375.5341491228071" cy="236.49122807017545" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="1.9500000000000002" data-y="-0.44999999999999996" cx="375.5341491228071" cy="250.5263157894737" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="-0.44999999999999996" data-y="2.55" cx="207.11309649122816" cy="40.00000000000003" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="-1.9500000000000002" data-y="0.7" cx="101.84993859649128" cy="169.8245614035088" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.9" data-x="0.44999999999999996" data-y="2.55" cx="270.2709912280703" cy="40.00000000000003" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.10" data-x="1.9500000000000002" data-y="0.85" cx="375.5341491228071" cy="159.29824561403512" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12" data-x="0" data-y="-2.55" cx="238.6920438596492" cy="397.8947368421053" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13" data-x="-1.9500000000000002" data-y="0.9" cx="101.84993859649128" cy="155.78947368421055" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14" data-x="1.9500000000000002" data-y="-0.6499999999999999" cx="375.5341491228071" cy="264.56140350877195" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.15" data-x="-0.65" data-y="-2.55" cx="193.0780087719299" cy="397.8947368421053" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.16" data-x="0.65" data-y="-2.55" cx="284.3060789473685" cy="397.8947368421053" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1" data-x="-0.6500000000000002" data-y="-3.76" cx="193.0780087719299" cy="482.8070175438597" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (charger_connectivity_net0)" data-x="-0.6500000000000005" data-y="-4.859999999999999" cx="193.07800877192986" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="1.3289106999999987" data-y="-3.76" cx="331.9489350877193" cy="482.8070175438597" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="1.3289106999999987" data-y="-4.859999999999999" cx="331.9489350877193" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="3.3078213999999977" data-y="-3.3566666666666656" cx="470.8198614035087" cy="454.50292397660814" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="3.3078213999999977" data-y="-4.456666666666665" cx="470.8198614035087" cy="531.6959064327484" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":70.17543859649123,"c":0,"e":238.6920438596492,"b":0,"d":-70.17543859649123,"f":218.94736842105266};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>