<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-1.1379786002407855e-15,2.1049999999999995 -1,-0.30000000000000004" data-type="line" data-label="" points="499.9999999999998,232.93544457978095 324.6041412911084,654.7624847746652" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="1,0.30000000000000004 -1.1934897514720433e-15,3.205" data-type="line" data-label="" points="675.3958587088916,549.5249695493301 499.9999999999998,40.000000000000114" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="C3" data-x="-0.15500000000000114" data-y="2.655" x="399.1473812423871" y="40.000000000000085" width="147.33252131546897" height="192.93544457978084" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0057013888888888895"/></g><g><rect data-type="rect" data-label="U2" data-x="0" data-y="0" x="219.36662606577352" y="444.28745432399523" width="561.266747868453" height="315.71254567600477" fill="rgba(245, 158, 11, 0.18)" stroke="none" stroke-width="0.0057013888888888895"/></g><text data-type="text" data-label="C3" data-x="-0.15500000000000114" data-y="2.655" x="472.8136419001216" y="136.4677222898905" fill="black" font-size="32.413154689403164" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C3</text><text data-type="text" data-label="U2" data-x="0" data-y="0" x="500" y="602.1437271619976" fill="black" font-size="61.38855054811205" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U2</text><g><circle data-type="point" data-label="C3.1" data-x="-1.1934897514720433e-15" data-y="3.205" cx="499.9999999999998" cy="40.000000000000114" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.1379786002407855e-15" data-y="2.1049999999999995" cx="499.9999999999998" cy="232.93544457978095" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net26)" data-x="-1" data-y="0.30000000000000004" cx="324.6041412911084" cy="549.5249695493301" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net27)" data-x="-1" data-y="0.10000000000000003" cx="324.6041412911084" cy="584.6041412911085" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.3 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net28)" data-x="-1" data-y="-0.09999999999999998" cx="324.6041412911084" cy="619.6833130328868" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.4 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="-0.30000000000000004" cx="324.6041412911084" cy="654.7624847746652" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.5 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net32)" data-x="1" data-y="-0.30000000000000004" cx="675.3958587088916" cy="654.7624847746652" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.6 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net31)" data-x="1" data-y="-0.10000000000000003" cx="675.3958587088916" cy="619.6833130328868" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.7 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net30)" data-x="1" data-y="0.09999999999999998" cx="675.3958587088916" cy="584.6041412911085" r="3" fill="black"/></g><g><circle data-type="point" data-label="U2.8" data-x="1" data-y="0.30000000000000004" cx="675.3958587088916" cy="549.5249695493301" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":175.39585870889158,"c":0,"e":500,"b":0,"d":-175.39585870889158,"f":602.1437271619976};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>