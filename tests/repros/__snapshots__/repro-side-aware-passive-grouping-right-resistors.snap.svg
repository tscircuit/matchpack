 data-label="U1.16" data-x="0.65" data-y="-2.55" cx="326.56533686274514" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1" data-x="2.3394553499999997" data-y="-0.9500000000000002" cx="498.82352941176475" cy="396.8627450980392" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (charger_connectivity_net0)" data-x="2.3394553499999997" data-y="-2.0500000000000003" cx="498.82352941176475" cy="509.01960784313724" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="2.3394553499999997" data-y="2.05" cx="498.82352941176475" cy="90.98039215686279" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="2.3394553499999997" data-y="0.9499999999999997" cx="498.82352941176475" cy="203.13725490196083" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="2.3394553499999997" data-y="0.5499999999999998" cx="498.82352941176475" cy="243.921568627451" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="2.3394553499999997" data-y="-0.5500000000000003" cx="498.82352941176475" cy="356.07843137254906" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":101.96078431372548,"c":0,"e":260.2908270588236,"b":0,"d":-101.96078431372548,"f":300};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>