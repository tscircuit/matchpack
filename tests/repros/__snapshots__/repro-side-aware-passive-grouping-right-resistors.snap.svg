><rect data-type="rect" data-label="R1" data-x="2.3394553499999997" data-y="-1.5000000000000002" x="459.1143564705883" y="396.8627450980393" width="79.41834588235292" height="112.15686274509801" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.009807692307692309"/></g><g><rect data-type="rect" data-label="R2" data-x="2.3394553499999997" data-y="1.4999999999999998" x="459.1143564705883" y="90.98039215686278" width="79.41834588235292" height="112.15686274509804" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.009807692307692309"/></g><g><rect data-type="rect" data-label="R3" data-x="2.3394553499999997" data-y="-2.220446049250313e-16" x="459.1143564705883" y="243.92156862745097" width="79.41834588235292" height="112.15686274509807" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.009807692307692309"/></g><text data-type="text" data-label="U1 [fixed]" data-x="0" data-y="0" x="260.2908270588236" y="300" fill="black" font-size="35.686274509803916" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1 [fixed]</text><text data-type="text" data-label="R1" data-x="2.3394553499999997" data-y="-1.5000000000000002" x="498.82352941176475" y="452.9411764705883" fill="black" font-size="17.472036094117623" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="2.3394553499999997" data-y="1.4999999999999998" x="498.82352941176475" y="147.0588235294118" fill="black" font-size="17.472036094117623" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="2.3394553499999997" data-y="-2.220446049250313e-16" x="498.82352941176475" y="300" fill="black" font-size="17.472036094117623" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><g><circle data-type="point" data-label="U1.1" data-x="-1.9500000000000002" data-y="-0.7000000000000001" cx="61.467297647