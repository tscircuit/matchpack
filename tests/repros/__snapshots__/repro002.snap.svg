e data-type="point" data-label="AUX_LED.1" data-x="6.593093724999999" data-y="1.600000000000001" cx="460.81432591100383" cy="83.40536007022642" r="3" fill="black"/></g><g><circle data-type="point" data-label="AUX_LED.2" data-x="6.593093724999999" data-y="0.5200000000000009" cx="460.81432591100383" cy="147.89046066938238" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.1" data-x="6.593093724999999" data-y="-0.17999999999999916" cx="460.81432591100383" cy="189.68635920587235" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="6.593093724999999" data-y="-1.2799999999999991" cx="460.81432591100383" cy="255.3656283346423" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP5.1" data-x="3.2241830250000003" data-y="-2.6525000000000003" cx="259.66196906001045" cy="337.3154436794031" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP6.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="4.624183025" data-y="-4.117500000000001" cx="343.25376613299034" cy="424.78828847362854" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP7.1" data-x="6.024183024999999" data-y="-5.3475" cx="426.8455632059703" cy="498.22965304488946" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP8.1" data-x="7.424183024999999" data-y="-5.9624999999999995" cx="510.43736027895017" cy="534.9503353305199" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP9.1" data-x="8.824183024999998" data-y="-5.9624999999999995" cx="594.02915735193" cy="534.9503353305199" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":59.708426480699956,"c":0,"e":67.15107395147714,"b":0,"d":-59.708426480699956,"f":178.93884243934642};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>