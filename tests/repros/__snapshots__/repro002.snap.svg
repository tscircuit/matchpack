6383749999995" data-y="-1.2800000000000005" cx="270.28436353351" cy="312.4471641144351" r="3" fill="black"/></g><g><circle data-type="point" data-label="AUX_LED.1" data-x="6.593093724999999" data-y="1.5999999999999992" cx="372.6939899060775" cy="176.49611817426654" r="3" fill="black"/></g><g><circle data-type="point" data-label="AUX_LED.2" data-x="6.593093724999999" data-y="0.5199999999999991" cx="372.6939899060775" cy="227.47776040182976" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.1" data-x="6.593093724999999" data-y="-0.18000000000000094" cx="372.6939899060775" cy="260.5214174011763" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="6.593093724999999" data-y="-1.280000000000001" cx="372.6939899060775" cy="312.4471641144351" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP5.1" data-x="5.508366049999999" data-y="-2.6525" cx="321.48917671979376" cy="377.2363344452967" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP6.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="6.908366049999999" data-y="-4.1175" cx="387.5764907184868" cy="446.3919880225005" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP7.1" data-x="8.308366049999998" data-y="-4.1175" cx="453.66380471717986" cy="446.3919880225005" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP8.1" data-x="9.808366049999997" data-y="-4.1175" cx="524.4716411443509" cy="446.3919880225005" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP9.1" data-x="11.308366049999995" data-y="-4.1175" cx="595.279477571522" cy="446.3919880225005" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":47.20522428478076,"c":0,"e":61.4655218868719,"b":0,"d":-47.20522428478076,"f":252.02447702991572};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>