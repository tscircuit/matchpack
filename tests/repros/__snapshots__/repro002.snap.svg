ubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="4.4236383749999995" data-y="-1.2800000000000005" cx="274.6411487511095" cy="307.6146859042259" r="3" fill="black"/></g><g><circle data-type="point" data-label="AUX_LED.1" data-x="6.593093724999999" data-y="1.5999999999999992" cx="378.988278562789" cy="169.0915612602285" r="3" fill="black"/></g><g><circle data-type="point" data-label="AUX_LED.2" data-x="6.593093724999999" data-y="0.5199999999999991" cx="378.988278562789" cy="221.03773300172756" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.1" data-x="6.593093724999999" data-y="-0.18000000000000094" cx="378.988278562789" cy="254.7065480193658" r="3" fill="black"/></g><g><circle data-type="point" data-label="R28.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="6.593093724999999" data-y="-1.280000000000001" cx="378.988278562789" cy="307.61468590422595" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP5.1" data-x="5.2880937249999995" data-y="-2.3874999999999997" cx="316.2199877084777" cy="360.88356109284643" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP6.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="6.688093724999999" data-y="-3.8525" cx="383.5576177437542" cy="431.3475810940465" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP7.1" data-x="8.088093724999998" data-y="-4.312500000000001" cx="450.8952477790307" cy="453.4728023913517" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP8.1" data-x="9.588093724999997" data-y="-4.312500000000001" cx="523.0427085311126" cy="453.4728023913517" r="3" fill="black"/></g><g><circle data-type="point" data-label="TP9.1" data-x="11.088093724999995" data-y="-4.312500000000001" cx="595.1901692831946" cy="453.4728023913517" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":48.09830716805466,"c":0,"e":61.87163138996533,"b":0,"d":-48.09830716805466,"f":246.04885272911594};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>