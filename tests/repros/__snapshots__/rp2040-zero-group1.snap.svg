5692586" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="0.4800000000000001" data-y="2.005" cx="655.3700189753322" cy="251.1764705882353" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="1.96" data-y="3.1050000000000004" cx="913.7381404174573" cy="59.14611005692586" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.96" data-y="2.005" cx="913.7381404174573" cy="251.1764705882353" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="-2.47" data-y="0.8000000000000002" cx="140.37950664136616" cy="461.5370018975332" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.47" data-y="-0.29999999999999993" cx="140.37950664136616" cy="653.5673624288426" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1" data-y="0.2" cx="397.00189753320683" cy="566.2808349146111" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="0" cx="397.00189753320683" cy="601.1954459203037" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1" data-y="-0.2" cx="397.00189753320683" cy="636.1100569259962" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="1" data-y="-0.1" cx="746.1480075901329" cy="618.65275142315" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="1" data-y="0.1" cx="746.1480075901329" cy="583.7381404174573" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":174.57305502846302,"c":0,"e":571.5749525616699,"b":0,"d":-174.57305502846302,"f":601.1954459203037};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>