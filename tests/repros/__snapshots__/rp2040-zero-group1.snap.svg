bel="U1" data-x="-0.9449999999999998" data-y="0.10000000000000009" x="463.99999999999994" y="399.99999999999994" fill="black" font-size="46.36097560975611" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="C6.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-2.21" data-y="-0.8500000000000001" cx="241.85365853658527" cy="566.8292682926829" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.21" data-y="-1.9500000000000002" cx="241.85365853658527" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-2.21" data-y="0.6499999999999999" cx="241.85365853658527" cy="303.4146341463414" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.21" data-y="-0.4500000000000002" cx="241.85365853658527" cy="496.5853658536585" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-2.21" data-y="2.15" cx="241.85365853658527" cy="39.99999999999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.21" data-y="1.0499999999999998" cx="241.85365853658527" cy="233.17073170731703" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="1.28" data-y="0.19999999999999996" cx="854.7317073170732" cy="382.43902439024384" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.28" data-y="-0.9000000000000001" cx="854.7317073170732" cy="575.609756097561" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="0.3000000000000001" cx="288.39024390243895" cy="364.87804878048775" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9449999999999998" data-y="0.10000000000000009" cx="288.39024390243895" cy="399.99999999999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="-0.09999999999999992" cx="288.39024390243895" cy="435.12195121951214" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="0.05500000000000016" data-y="8.326672684688674e-17" cx="639.609756097561" cy="417.56097560975604" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="0.05500000000000016" data-y="0.2000000000000001" cx="639.609756097561" cy="382.43902439024384" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":175.609756097561,"c":0,"e":629.951219512195,"b":0,"d":-175.609756097561,"f":417.56097560975604};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>