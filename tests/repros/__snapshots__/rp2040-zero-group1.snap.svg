="19.463766456783056" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C5</text><text data-type="text" data-label="U1" data-x="-0.9449999999999998" data-y="0.10000000000000009" x="697.7447052089296" y="389.4676588437321" fill="black" font-size="27.805380652547232" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="C6.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-3.415" data-y="0.7500000000000002" cx="437.5958786491128" cy="321.0074413279908" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-3.415" data-y="-0.34999999999999987" cx="437.5958786491128" cy="436.86319404693756" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-4.895" data-y="0.7500000000000002" cx="281.7172295363481" cy="321.0074413279908" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-4.895" data-y="-0.34999999999999987" cx="281.7172295363481" cy="436.86319404693756" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-6.375" data-y="0.7500000000000002" cx="125.83858042358327" cy="321.0074413279908" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-6.375" data-y="-0.34999999999999987" cx="125.83858042358327" cy="436.86319404693756" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="1.28" data-y="0.19999999999999996" cx="932.0892959358902" cy="378.93531768746425" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.28" data-y="-0.9000000000000001" cx="932.0892959358902" cy="494.791070406411" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="0.3000000000000001" cx="592.4212936462508" cy="368.4029765311963" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9449999999999998" data-y="0.10000000000000009" cx="592.4212936462508" cy="389.4676588437321" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="-0.09999999999999992" cx="592.4212936462508" cy="410.5323411562679" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="0.05500000000000016" data-y="8.326672684688674e-17" cx="803.0681167716085" cy="400" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="0.05500000000000016" data-y="0.2000000000000001" cx="803.0681167716085" cy="378.9353176874642" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":105.32341156267888,"c":0,"e":797.2753291356612,"b":0,"d":-105.32341156267888,"f":400};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>