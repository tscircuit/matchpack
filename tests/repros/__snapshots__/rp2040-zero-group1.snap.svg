a-label="U1" data-x="-0.9449999999999998" data-y="0.10000000000000009" x="440.8038976857491" y="584.6041412911084" fill="black" font-size="46.30450669914739" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="C6.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9450000000000003" data-y="3.205" cx="265.4080389768575" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C6.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9450000000000003" data-y="2.1050000000000004" cx="265.4080389768575" cy="232.93544457978066" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-0.4650000000000003" data-y="3.205" cx="524.993909866017" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-0.4650000000000002" data-y="2.1050000000000004" cx="524.993909866017" cy="232.93544457978066" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="1.0149999999999997" data-y="3.205" cx="784.5797807551766" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.0149999999999997" data-y="2.1050000000000004" cx="784.5797807551766" cy="232.93544457978066" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="1.28" data-y="0.19999999999999996" cx="831.0596833130329" cy="567.0645554202192" r="3" fill="black"/></g><g><circle data-type="point" data-label="C5.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.28" data-y="-0.9000000000000001" cx="831.0596833130329" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="0.3000000000000001" cx="265.40803897685754" cy="549.52496954933" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9449999999999998" data-y="0.10000000000000009" cx="265.40803897685754" cy="584.6041412911084" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net0)" data-x="-1.9449999999999998" data-y="-0.09999999999999992" cx="265.40803897685754" cy="619.6833130328866" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="0.05500000000000016" data-y="8.326672684688674e-17" cx="616.1997563946408" cy="602.1437271619975" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net41)" data-x="0.05500000000000016" data-y="0.2000000000000001" cx="616.1997563946408" cy="567.0645554202192" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":175.39585870889158,"c":0,"e":606.5529841656517,"b":0,"d":-175.39585870889158,"f":602.1437271619975};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>