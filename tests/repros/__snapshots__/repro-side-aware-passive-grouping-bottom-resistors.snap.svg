data-x="-5.551115123125783e-17" data-y="-3.5" x="269.31563909090914" y="473.3333333333334" width="61.36872181818171" height="86.66666666666663" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.01269230769230769"/></g><g><rect data-type="rect" data-label="R3" data-x="1.178910699999999" data-y="-3.5" x="362.19951242424236" y="473.3333333333334" width="61.36872181818177" height="86.66666666666663" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.01269230769230769"/></g><text data-type="text" data-label="U1" data-x="0" data-y="0" x="300" y="240.9090909090909" fill="black" font-size="27.575757575757578" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><text data-type="text" data-label="R1" data-x="-1.178910699999999" data-y="-3.5" x="207.11612666666673" y="516.6666666666667" fill="black" font-size="13.501118799999983" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="-5.551115123125783e-17" data-y="-3.5" x="300" y="516.6666666666667" fill="black" font-size="13.501118799999983" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="1.178910699999999" data-y="-3.5" x="392.88387333333327" y="516.6666666666667" fill="black" font-size="13.501118799999983" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><g><circle data-type="point" data-label="U1.1" data-x="-1.9500000000000002" data-y="-0.7000000000000001" cx="146.36363636363635" cy="296.06060606060606" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-1.9500000000000002" data-y="-0.9" cx="146.36363636363635" cy="311.8181818181818" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="1.9500000000000002" data-y="-0.85" cx="453.6363636363636" cy="307.8787878787879" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="1.9500000000000002" data-y="-0.2499999999999999" cx="453.6363636363636" cy="260.6060606060606" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="1.9500000000000002" data-y="-0.44999999999999996" cx="453.6363636363636" cy="276.3636363636364" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="-0.44999999999999996" data-y="2.55" cx="264.54545454545456" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="-1.9500000000000002" data-y="0.7" cx="146.36363636363635" cy="185.75757575757575" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.9" data-x="0.44999999999999996" data-y="2.55" cx="335.45454545454544" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.10" data-x="1.9500000000000002" data-y="0.85" cx="453.6363636363636" cy="173.93939393939394" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12" data-x="0" data-y="-2.55" cx="300" cy="441.8181818181818" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13" data-x="-1.9500000000000002" data-y="0.9" cx="146.36363636363635" cy="170" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14" data-x="1.9500000000000002" data-y="-0.6499999999999999" cx="453.6363636363636" cy="292.1212121212121" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.15" data-x="-0.65" data-y="-2.55" cx="248.78787878787878" cy="441.8181818181818" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.16" data-x="0.65" data-y="-2.55" cx="351.21212121212125" cy="441.8181818181818" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1" data-x="-1.178910699999999" data-y="-2.95" cx="207.11612666666673" cy="473.33333333333337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (charger_connectivity_net0)" data-x="-1.178910699999999" data-y="-4.05" cx="207.11612666666673" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="4.552220969839881e-17" data-y="-2.95" cx="300" cy="473.33333333333337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="-1.5654451216091445e-16" data-y="-4.05" cx="300" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="1.178910699999999" data-y="-2.95" cx="392.88387333333327" cy="473.33333333333337" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="1.178910699999999" data-y="-4.05" cx="392.88387333333327" cy="560" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":78.7878787878788,"c":0,"e":300,"b":0,"d":-78.7878787878788,"f":240.9090909090909};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>