988505747125" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C17</text><text data-type="text" data-label="C16" data-x="-2.13" data-y="-0.4500000000000002" x="124.59770114942529" y="400" fill="black" font-size="37.222988505747125" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C16</text><text data-type="text" data-label="X1" data-x="0" data-y="0" x="500" y="320.6896551724138" fill="black" font-size="46.528735632183924" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><g><circle data-type="point" data-label="R8.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net33)" data-x="2.3094553499999995" data-y="1" cx="907.030444827586" cy="144.44444444444443" r="3" fill="black"/></g><g><circle data-type="point" data-label="R8.2" data-x="2.3094553499999995" data-y="-0.09999999999999987" cx="907.030444827586" cy="338.3141762452107" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.1" data-x="2.3449999999999998" data-y="-0.8" cx="913.2950191570881" cy="461.6858237547892" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="2.3449999999999998" data-y="-1.9000000000000001" cx="913.2950191570881" cy="655.5555555555555" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1.915" data-y="0.09999999999999987" cx="162.4904214559387" cy="303.06513409961684" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9149999999999998" data-y="-1.0000000000000002" cx="162.4904214559387" cy="496.93486590038316" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1" data-y="0.1" cx="323.7547892720306" cy="303.06513409961684" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="-0.1" cx="323.7547892720306" cy="338.3141762452107" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.3" data-x="1" data-y="-0.1" cx="676.2452107279694" cy="338.3141762452107" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.4 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1" data-y="0.1" cx="676.2452107279694" cy="303.06513409961684" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":176.24521072796935,"c":0,"e":500,"b":0,"d":-176.24521072796935,"f":320.6896551724138};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>