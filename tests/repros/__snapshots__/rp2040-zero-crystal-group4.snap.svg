7</text><text data-type="text" data-label="C16" data-x="-2.03" data-y="-0.4500000000000002" x="126.25000000000006" y="400" fill="black" font-size="37.95" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C16</text><text data-type="text" data-label="X1" data-x="0" data-y="0" x="491.01562500000006" y="319.14062499999994" fill="black" font-size="47.43750000000002" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><g><circle data-type="point" data-label="R8.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net33)" data-x="2.3094553499999995" data-y="1" cx="905.995883203125" cy="139.45312499999991" r="3" fill="black"/></g><g><circle data-type="point" data-label="R8.2" data-x="2.3094553499999995" data-y="-0.09999999999999987" cx="905.995883203125" cy="337.10937499999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.1" data-x="2.3449999999999998" data-y="-0.8000000000000005" cx="912.3828125" cy="462.89062500000006" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="2.3449999999999998" data-y="-1.9000000000000006" cx="912.3828125" cy="660.5468750000001" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1.815" data-y="0.09999999999999987" cx="164.8828125" cy="301.17187499999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.8149999999999997" data-y="-1.0000000000000002" cx="164.88281250000006" cy="498.828125" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1" data-y="0.1" cx="311.328125" cy="301.17187499999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="-0.1" cx="311.328125" cy="337.10937499999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.3" data-x="1" data-y="-0.1" cx="670.7031250000001" cy="337.10937499999994" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.4 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1" data-y="0.1" cx="670.7031250000001" cy="301.17187499999994" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":179.68750000000003,"c":0,"e":491.01562500000006,"b":0,"d":-179.68750000000003,"f":319.14062499999994};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>