hor="middle" dominant-baseline="central">C17</text><text data-type="text" data-label="C16" data-x="-2.28" data-y="2.026666666666667" x="171.5520960862197" y="228.31336612476406" fill="black" font-size="31.394127337186" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C16</text><text data-type="text" data-label="X1" data-x="0" data-y="0" x="510.4659707490231" y="529.5701436028115" fill="black" font-size="39.24265917148251" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><g><circle data-type="point" data-label="R8.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net33)" data-x="2.8644553499999996" data-y="1" cx="936.2570503398549" cy="380.923707347196" r="3" fill="black"/></g><g><circle data-type="point" data-label="R8.2" data-x="2.8644553499999996" data-y="-0.09999999999999987" cx="936.2570503398549" cy="544.434787228373" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.1" data-x="-2.47" data-y="0.26666666666666683" cx="143.30927319765271" cy="489.9310939346474" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.47" data-y="-0.8333333333333333" cx="143.30927319765271" cy="653.4421738158245" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-2.065" data-y="2.576666666666667" cx="203.511079881177" cy="146.55782618417544" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-2.065" data-y="1.4766666666666668" cx="203.511079881177" cy="310.0689060653526" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1" data-y="0.1" cx="361.81953449340756" cy="514.7054999772499" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="-0.1" cx="361.81953449340756" cy="544.4347872283731" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.3" data-x="1" data-y="-0.1" cx="659.1124070046386" cy="544.4347872283731" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.4 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1" data-y="0.1" cx="659.1124070046386" cy="514.7054999772499" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":148.64643625561553,"c":0,"e":510.4659707490231,"b":0,"d":-148.64643625561553,"f":529.5701436028115};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>