px"/></g><g><polyline data-points="1,-0.1 1.7298638375,0.19999999999999996" data-type="line" data-label="" points="766.7396061269146,420.1312910284464 913.6706193654267,359.73741794310723" fill="none" stroke="black" stroke-width="1px"/></g><g><polyline data-points="-1,0.1 -1.915,0.09999999999999987" data-type="line" data-label="" points="364.11378555798683,379.8687089715536 179.91247264770237,379.86870897155364" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="R8" data-x="1.48" data-y="0.75" x="780.913743654267" y="138.29321663019692" width="164.91211881838058" height="221.4442013129103" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.004967391304347826"/></g><g><rect data-type="rect" data-label="C17" data-x="1.48" data-y="-0.75" x="766.7396061269146" y="440.2625820568927" width="193.26039387308538" height="221.44420131291037" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.004967391304347826"/></g><g><rect data-type="rect" data-label="C16" data-x="-2.13" data-y="-0.4500000000000002" x="39.99999999999997" y="379.8687089715537" width="193.26039387308532" height="221.44420131291025" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.004967391304347826"/></g><g><rect data-type="rect" data-label="X1" data-x="0" data-y="0" x="444.63894967177237" y="259.08096280087534" width="241.57549234135672" height="281.8380743982494" fill="rgba(59, 130, 246, 0.12)" stroke="none" stroke-width="0.004967391304347826"/></g><text data-type="text" data-label="R8" data-x="1.48" data-y="0.75" x="863.3698030634573" y="249.01531728665208" fill="black" font-size="36.280666140043735" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R8</text><text data-type="text" data-label="C17" data-x="1.48" data-y="-0.75" x="863.3698030634573" y="550.9846827133479" fill="black" font-size="42.517286652078774" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C17</text><text data-type="text" data-label="C16" data-x="-2.13" data-y="-0.4500000000000002" x="136.63019693654263" y="490.5908096280088" fill="black" font-size="42.517286652078774" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C16</text><text data-type="text" data-label="X1" data-x="0" data-y="0" x="565.4266958424507" y="400" fill="black" font-size="53.14660831509848" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">X1</text><g><circle data-type="point" data-label="R8.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net33)" data-x="1.7298638375" data-y="1.2999999999999998" cx="913.6706193654267" cy="138.29321663019698" r="3" fill="black"/></g><g><circle data-type="point" data-label="R8.2" data-x="1.7298638375" data-y="0.19999999999999996" cx="913.6706193654267" cy="359.73741794310723" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.1" data-x="1.6949999999999998" data-y="-0.19999999999999996" cx="906.6520787746169" cy="440.26258205689277" r="3" fill="black"/></g><g><circle data-type="point" data-label="C17.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1.695" data-y="-1.3" cx="906.652078774617" cy="661.7067833698031" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1.915" data-y="0.09999999999999987" cx="179.91247264770237" cy="379.86870897155364" r="3" fill="black"/></g><g><circle data-type="point" data-label="C16.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1.9149999999999998" data-y="-1.0000000000000002" cx="179.91247264770243" cy="601.3129102844639" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.1 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net34)" data-x="-1" data-y="0.1" cx="364.11378555798683" cy="379.8687089715536" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.2 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="-1" data-y="-0.1" cx="364.11378555798683" cy="420.1312910284464" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.3" data-x="1" data-y="-0.1" cx="766.7396061269146" cy="420.1312910284464" r="3" fill="black"/></g><g><circle data-type="point" data-label="X1.4 (unnamedsubcircuitsubcircuit_source_group_5_connectivity_net1)" data-x="1" data-y="0.1" cx="766.7396061269146" cy="379.8687089715536" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":201.3129102844639,"c":0,"e":565.4266958424507,"b":0,"d":-201.3129102844639,"f":400};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>