anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="-1.9789106999999992" data-y="-4.615" x="99.13695396806003" y="664.2107751361602" fill="black" font-size="26.02025974594641" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="1.1859776749999997" data-y="-1.1450000000000002" x="579.7102934957452" y="137.30767759450745" fill="black" font-size="26.02025974594641" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><text data-type="text" data-label="LED1" data-x="3.232933024999999" data-y="-1.1450000000000002" x="890.530787571958" y="137.30767759450745" fill="black" font-size="30.566453468338537" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">LED1</text><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.8200000000000001" data-y="-0.605" cx="275.11206566954843" cy="55.311230138457674" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-0.8200000000000003" data-y="-1.705" cx="275.11206566954843" cy="222.3410305118923" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="0.8200000000000002" data-y="-0.605" cx="524.1383134990328" cy="55.311230138457674" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.82" data-y="-1.705" cx="524.1383134990328" cy="222.3410305118923" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="-3.367778697655222e-17" data-y="-5.169999999999999" cx="399.62518958429064" cy="748.4849016882113" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="3.367778697655222e-17" data-y="-4.069999999999999" cx="399.62518958429064" cy="581.4551013147766" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="1.978910699999999" data-y="-5.165" cx="700.1134252005212" cy="747.7256753228776" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.978910699999999" data-y="-4.065" cx="700.1134252005212" cy="580.6958749494431" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="-1.9789106999999992" data-y="-5.165" cx="99.13695396806003" cy="747.7256753228776" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.9789106999999992" data-y="-4.065" cx="99.13695396806003" cy="580.6958749494431" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.1859776749999997" data-y="-0.5950000000000002" cx="579.7102934957452" cy="53.792777407790126" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="1.1859776749999997" data-y="-1.6950000000000003" cx="579.7102934957452" cy="220.82257778122477" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="3.232933024999999" data-y="-0.6050000000000002" cx="890.530787571958" cy="55.31123013845772" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="3.232933024999999" data-y="-1.6850000000000003" cx="890.530787571958" cy="219.30412505055716" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":151.84527306675875,"c":0,"e":399.62518958429064,"b":0,"d":-151.84527306675875,"f":-36.555160066931364};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>