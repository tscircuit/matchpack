pe="text" data-label="R3" data-x="-1.9789106999999992" data-y="-4.615" x="229.25149113043472" y="690.504347826087" fill="black" font-size="21.457296500869543" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="2.2094553499999994" data-y="-2.305" x="753.7077617391303" y="401.2521739130435" fill="black" font-size="21.457296500869543" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><text data-type="text" data-label="LED1" data-x="2.2775" data-y="0.01499999999999968" x="762.2281353043479" y="110.74782608695647" fill="black" font-size="25.206260869565227" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">LED1</text><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.0103336092965664e-16" data-y="0.55" cx="477.0455266086956" cy="43.75652173913031" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.0103336092965664e-16" data-y="-0.55" cx="477.0455266086956" cy="181.495652173913" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.0103336092965664e-16" data-y="-1.76" cx="477.0455266086956" cy="333.0086956521739" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.0103336092965664e-16" data-y="-2.8600000000000003" cx="477.0455266086956" cy="470.7478260869566" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="-3.367778697655222e-17" data-y="-5.169999999999999" cx="477.0455266086956" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="3.367778697655222e-17" data-y="-4.069999999999999" cx="477.0455266086956" cy="622.2608695652174" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="1.978910699999999" data-y="-5.165" cx="724.8395620869564" cy="759.3739130434783" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.978910699999999" data-y="-4.065" cx="724.8395620869564" cy="621.6347826086958" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="-1.9789106999999992" data-y="-5.165" cx="229.25149113043472" cy="759.3739130434783" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.9789106999999992" data-y="-4.065" cx="229.25149113043472" cy="621.6347826086958" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="2.2094553499999994" data-y="-1.7550000000000001" cx="753.7077617391303" cy="332.38260869565215" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="2.2094553499999994" data-y="-2.8550000000000004" cx="753.7077617391303" cy="470.1217391304349" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="2.2775" data-y="0.5549999999999997" cx="762.2281353043479" cy="43.13043478260862" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="2.2775" data-y="-0.5250000000000004" cx="762.2281353043479" cy="178.36521739130433" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":125.21739130434787,"c":0,"e":477.0455266086956,"b":0,"d":-125.21739130434787,"f":112.62608695652165};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>