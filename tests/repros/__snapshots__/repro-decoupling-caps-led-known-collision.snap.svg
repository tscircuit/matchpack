up_0_connectivity_net3)" data-x="-5.0083660499999985" data-y="-0.55" cx="355.6666033958372" cy="396.48554343892187" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-5.0083660499999985" data-y="0.55" cx="355.6666033958372" cy="293.39481764729607" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="-6.987276749999998" data-y="-0.55" cx="170.20538490509705" cy="396.48554343892187" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-6.987276749999998" data-y="0.55" cx="170.20538490509705" cy="293.39481764729607" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-7.987140587499996" data-y="-0.6099999999999999" cx="76.49930426811966" cy="402.1086739366469" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="-7.987140587499996" data-y="-1.71" cx="76.49930426811966" cy="505.19939972827274" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="-5.940185237499997" data-y="-0.6199999999999999" cx="268.3375885358937" cy="403.0458623529344" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-5.940185237499997" data-y="-1.7" cx="268.3375885358937" cy="504.2622113119852" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":93.71884162875074,"c":0,"e":825.044868054599,"b":0,"d":-93.71884162875074,"f":344.94018054310897};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>