nant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="-4.222388374999999" data-y="2.3199999999999994" x="92.39957305699727" y="242.9178042000337" fill="black" font-size="23.055812145078814" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="-1.091522325" data-y="0" x="513.6443815277187" y="555.0640091301595" fill="black" font-size="23.055812145078814" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><text data-type="text" data-label="LED1" data-x="0.9554330249999994" data-y="0" x="789.0535815983727" y="555.0640091301595" fill="black" font-size="27.08406510880791" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">LED1</text><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.03402232500000014" data-y="2.87" cx="655.9265417491015" cy="168.91762630711582" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-0.034022325000000346" data-y="1.7699999999999998" cx="655.9265417491014" cy="316.91798209295143" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.605977675" data-y="2.87" cx="876.5816176479836" cy="168.91762630711582" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="1.605977675" data-y="1.7699999999999998" cx="876.5816176479836" cy="316.91798209295143" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net2)" data-x="-2.2434776749999994" data-y="1.7699999999999994" cx="358.6536527555399" cy="316.9179820929515" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.2434776749999994" data-y="2.869999999999999" cx="358.6536527555399" cy="168.91762630711594" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="-2.7364106999999986" data-y="-0.5400000000000006" cx="292.3315954113689" cy="627.7187292432062" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.7364106999999986" data-y="0.5599999999999995" cx="292.3315954113689" cy="479.7183734573706" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="-4.222388374999999" data-y="1.7699999999999994" cx="92.39957305699727" cy="316.9179820929515" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-4.222388374999999" data-y="2.869999999999999" cx="92.39957305699727" cy="168.91762630711594" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.091522325" data-y="0.55" cx="513.6443815277187" cy="481.06383123724174" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="-1.091522325" data-y="-0.55" cx="513.6443815277187" cy="629.0641870230774" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="0.9554330249999995" data-y="0.54" cx="789.0535815983727" cy="482.409289017113" r="3" fill="black"/></g><g><circle data-type="point" data-label="LED1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.9554330249999993" data-y="-0.54" cx="789.0535815983727" cy="627.7187292432061" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":134.54577798712324,"c":0,"e":660.5041019351572,"b":0,"d":-134.54577798712324,"f":555.0640091301595};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>