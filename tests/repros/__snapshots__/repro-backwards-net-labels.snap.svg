<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-0.6000000000000001,0.30000000000000004 -1.6394553499999995,0.30000000000000004" data-type="line" data-label="" points="520.3476177777777,235.5555555555556 335.5555555555556,235.5555555555556" fill="none" stroke="black" stroke-width="1px"/></g><g><polyline data-points="-0.6000000000000001,-0.30000000000000004 -0.6,-1.55" data-type="line" data-label="" points="520.3476177777777,342.22222222222223 520.3476177777777,564.4444444444443" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="R1" data-x="-1.6394553499999995" data-y="0.8500000000000001" x="266.31904888888903" y="40.00000000000006" width="138.47301333333314" height="195.55555555555554" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.0056250000000000015"/></g><g><rect data-type="rect" data-label="C1" data-x="-0.6000000000000001" data-y="-2.1" x="410.1253955555555" y="564.4444444444443" width="220.44444444444446" height="195.55555555555566" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.0056250000000000015"/></g><g><rect data-type="rect" data-label="U1" data-x="0" data-y="0" x="591.4587288888888" y="128.88888888888897" width="71.11111111111109" height="319.9999999999999" fill="rgba(245, 158, 11, 0.18)" stroke="none" stroke-width="0.0056250000000000015"/></g><text data-type="text" data-label="R1" data-x="-1.6394553499999995" data-y="0.8500000000000001" x="335.5555555555556" y="137.77777777777783" fill="black" font-size="30.464062933333288" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="C1" data-x="-0.6000000000000001" data-y="-2.1" x="520.3476177777777" y="662.2222222222222" fill="black" font-size="43.02222222222222" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="U1" data-x="0" data-y="0" x="627.0142844444443" y="288.8888888888889" fill="black" font-size="15.644444444444442" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="R1.1" data-x="-1.6394553499999995" data-y="0.30000000000000004" cx="335.5555555555556" cy="235.5555555555556" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.6394553499999995" data-y="1.4000000000000001" cx="335.5555555555556" cy="40.00000000000006" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-0.6" data-y="-1.55" cx="520.3476177777777" cy="564.4444444444443" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-0.6000000000000002" data-y="-2.6500000000000004" cx="520.3476177777777" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1" data-x="-0.6000000000000001" data-y="0.30000000000000004" cx="520.3476177777777" cy="235.5555555555556" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-0.6000000000000001" data-y="0.10000000000000003" cx="520.3476177777777" cy="271.11111111111114" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="-0.6000000000000001" data-y="-0.09999999999999998" cx="520.3476177777777" cy="306.6666666666667" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="-0.6000000000000001" data-y="-0.30000000000000004" cx="520.3476177777777" cy="342.22222222222223" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="0.6000000000000001" data-y="-0.30000000000000004" cx="733.680951111111" cy="342.22222222222223" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="0.6000000000000001" data-y="-0.10000000000000003" cx="733.680951111111" cy="306.6666666666667" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="0.6000000000000001" data-y="0.09999999999999998" cx="733.680951111111" cy="271.11111111111114" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="0.6000000000000001" data-y="0.30000000000000004" cx="733.680951111111" cy="235.5555555555556" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":177.77777777777774,"c":0,"e":627.0142844444443,"b":0,"d":-177.77777777777774,"f":288.8888888888889};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>