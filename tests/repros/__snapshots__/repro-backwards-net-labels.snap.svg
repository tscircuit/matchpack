"U1" data-x="0" data-y="0" x="670.4303797468355" y="504.8101265822785" fill="black" font-size="16.040506329113928" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="R1.1" data-x="-0.6000000000000005" data-y="1.45" cx="561.0632911392404" cy="240.50632911392404" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-0.6000000000000005" data-y="2.55" cx="561.0632911392404" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-1.8500000000000005" data-y="-0.30000000000000004" cx="333.2151898734176" cy="559.493670886076" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.8500000000000005" data-y="-1.4000000000000001" cx="333.2151898734176" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1" data-x="-0.6000000000000001" data-y="0.30000000000000004" cx="561.0632911392405" cy="450.126582278481" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-0.6000000000000001" data-y="0.10000000000000003" cx="561.0632911392405" cy="486.5822784810127" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="-0.6000000000000001" data-y="-0.09999999999999998" cx="561.0632911392405" cy="523.0379746835443" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="-0.6000000000000001" data-y="-0.30000000000000004" cx="561.0632911392405" cy="559.493670886076" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="0.6000000000000001" data-y="-0.30000000000000004" cx="779.7974683544304" cy="559.493670886076" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="0.6000000000000001" data-y="-0.10000000000000003" cx="779.7974683544304" cy="523.0379746835443" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="0.6000000000000001" data-y="0.09999999999999998" cx="779.7974683544304" cy="486.5822784810127" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="0.6000000000000001" data-y="0.30000000000000004" cx="779.7974683544304" cy="450.126582278481" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":182.27848101265823,"c":0,"e":670.4303797468355,"b":0,"d":-182.27848101265823,"f":504.8101265822785};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>