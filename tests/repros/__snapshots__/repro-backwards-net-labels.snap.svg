ata-type="text" data-label="U1" data-x="0" data-y="0" x="655.0939960912051" y="258.8925081433225" fill="black" font-size="13.758957654723128" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="R1.1" data-x="-2.1944553499999992" data-y="0.30000000000000004" cx="311.98697068403914" cy="211.98697068403914" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.1944553499999992" data-y="1.4000000000000001" cx="311.98697068403914" cy="40.00000000000003" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-0.6" data-y="-2.1049999999999995" cx="561.2829211726383" cy="588.0130293159609" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-0.6000000000000002" data-y="-3.205" cx="561.2829211726383" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1" data-x="-0.6000000000000001" data-y="0.30000000000000004" cx="561.2829211726383" cy="211.98697068403914" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-0.6000000000000001" data-y="0.10000000000000003" cx="561.2829211726383" cy="243.25732899022805" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="-0.6000000000000001" data-y="-0.09999999999999998" cx="561.2829211726383" cy="274.52768729641696" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="-0.6000000000000001" data-y="-0.30000000000000004" cx="561.2829211726383" cy="305.7980456026059" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="0.6000000000000001" data-y="-0.30000000000000004" cx="748.9050710097719" cy="305.7980456026059" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="0.6000000000000001" data-y="-0.10000000000000003" cx="748.9050710097719" cy="274.52768729641696" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="0.6000000000000001" data-y="0.09999999999999998" cx="748.9050710097719" cy="243.25732899022805" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="0.6000000000000001" data-y="0.30000000000000004" cx="748.9050710097719" cy="211.98697068403914" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":156.3517915309446,"c":0,"e":655.0939960912051,"b":0,"d":-156.3517915309446,"f":258.8925081433225};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>