ta-label="U1" data-x="0" data-y="0" x="671.6923076923077" y="400" fill="black" font-size="24.36923076923077" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">U1</text><g><circle data-type="point" data-label="R1.1" data-x="-1.2200000000000002" data-y="0.19999999999999996" cx="333.84615384615387" cy="344.61538461538464" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.2200000000000002" data-y="1.3" cx="333.84615384615387" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-1.2200000000000002" data-y="-0.19999999999999996" cx="333.84615384615387" cy="455.38461538461536" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.2200000000000002" data-y="-1.3" cx="333.84615384615387" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.1" data-x="-0.6000000000000001" data-y="0.30000000000000004" cx="505.53846153846155" cy="316.9230769230769" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-0.6000000000000001" data-y="0.10000000000000003" cx="505.53846153846155" cy="372.3076923076923" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="-0.6000000000000001" data-y="-0.09999999999999998" cx="505.53846153846155" cy="427.6923076923077" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4" data-x="-0.6000000000000001" data-y="-0.30000000000000004" cx="505.53846153846155" cy="483.0769230769231" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="0.6000000000000001" data-y="-0.30000000000000004" cx="837.8461538461539" cy="483.0769230769231" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="0.6000000000000001" data-y="-0.10000000000000003" cx="837.8461538461539" cy="427.6923076923077" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="0.6000000000000001" data-y="0.09999999999999998" cx="837.8461538461539" cy="372.3076923076923" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8" data-x="0.6000000000000001" data-y="0.30000000000000004" cx="837.8461538461539" cy="316.9230769230769" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":276.9230769230769,"c":0,"e":671.6923076923077,"b":0,"d":-276.9230769230769,"f":400};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>