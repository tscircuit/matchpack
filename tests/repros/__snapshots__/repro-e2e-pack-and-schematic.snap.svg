g><circle data-type="point" data-label="R1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="2.45" data-y="1.0000000000000002" cx="834.5128604832425" cy="92.81388589243969" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2" data-x="2.45" data-y="-0.09999999999999987" cx="834.5128604832425" cy="250.5691469992207" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="1.2" data-y="-1.8894553499999995" cx="655.2455183164459" cy="507.2018706157445" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2" data-x="0.09999999999999987" data-y="-1.8894553499999995" cx="497.4902572096649" cy="507.2018706157445" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-2.4699999999999998" data-y="0.8700000000000003" cx="128.91660171473114" cy="111.45768947778652" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.4699999999999998" data-y="-0.22999999999999976" cx="128.91660171473114" cy="269.2129505845675" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-1.2000000000000006" data-y="-1.57" cx="311.05222135619636" cy="461.3875413873735" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.2000000000000006" data-y="-2.67" cx="311.05222135619636" cy="619.1428024941545" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.1" data-x="2.9999999999999996" data-y="-2.1789106999999985" cx="913.390491036633" cy="548.7137836321122" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="2.9999999999999996" data-y="-3.2589106999999986" cx="913.390491036633" cy="703.6007672642245" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="1.9000000000000001" data-y="-1.1394553499999995" cx="755.635229929852" cy="399.6414653156665" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2" data-x="3" data-y="-1.1394553499999995" cx="913.390491036633" cy="399.6414653156665" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":143.41387373343727,"c":0,"e":483.1488698363212,"b":0,"d":-143.41387373343727,"f":236.22775962587698};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>