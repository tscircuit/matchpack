_group_0_connectivity_net0)" data-x="2.45" data-y="1.0000000000000002" cx="848.7227282999013" cy="201.71937926599367" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2" data-x="2.45" data-y="-0.09999999999999987" cx="848.7227282999013" cy="340.8153436617823" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="-0.09999999999999987" data-y="1.8894553499999995" cx="526.2729926551185" cy="89.24697045213583" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2" data-x="-1.2" data-y="1.8894553499999995" cx="387.17702825932986" cy="89.24697045213583" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="-2.8350000000000004" data-y="-1.7200000000000004" cx="180.42984481649847" cy="545.665763953762" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.8350000000000004" data-y="-2.8200000000000003" cx="180.42984481649847" cy="684.7617283495506" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-2.45" data-y="0.09999999999999987" cx="229.11343235502454" cy="315.5251683170935" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.45" data-y="-1.0000000000000002" cx="229.11343235502454" cy="454.6211327128822" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.1" data-x="-0.32500000000000007" data-y="-2.3100000000000005" cx="497.8215453923435" cy="620.2717812205942" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-0.3250000000000003" data-y="-3.3900000000000006" cx="497.8215453923435" cy="756.8387280819139" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="1.2" data-y="-1.45" cx="690.659132395596" cy="511.52402723843204" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2" data-x="1.2" data-y="-2.55" cx="690.659132395596" cy="650.6199916342207" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":126.45087672344422,"c":0,"e":538.9180803274629,"b":0,"d":-126.45087672344422,"f":328.1702559894379};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>