="central">R3</text><g><circle data-type="point" data-label="U1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="1.2000000000000002" data-y="-0.30000000000000004" cx="630.3575893915757" cy="433.6973478939158" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.2" data-x="-1.2000000000000002" data-y="-0.30000000000000004" cx="360.77880624024965" cy="433.6973478939158" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.3" data-x="1.2000000000000002" data-y="0.09999999999999998" cx="630.3575893915757" cy="388.7675507020281" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.4 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.2000000000000002" data-y="0.30000000000000004" cx="360.77880624024965" cy="366.3026521060842" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.5" data-x="-1.2000000000000002" data-y="0.10000000000000003" cx="360.77880624024965" cy="388.7675507020281" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.6" data-x="-1.2000000000000002" data-y="-0.09999999999999998" cx="360.77880624024965" cy="411.2324492979719" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.7" data-x="1.2000000000000002" data-y="-0.10000000000000003" cx="630.3575893915757" cy="411.2324492979719" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.8 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.2000000000000002" data-y="0.30000000000000004" cx="630.3575893915757" cy="366.3026521060842" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-9.988941532859016e-18" data-y="3.205" cx="495.5681978159127" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2" data-x="-2.1205566339217228e-16" data-y="2.1049999999999995" cx="495.5681978159127" cy="163.55694227769118" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="-3.1050000000000004" data-y="1.8944553499999994" cx="146.80064711388457" cy="187.20626333853363" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2" data-x="-2.005" data-y="1.8944553499999994" cx="270.35758939157574" cy="187.20626333853363" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1" data-x="0.5850000000000002" data-y="-2.1049999999999995" cx="561.2780262090484" cy="636.4430577223088" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.585" data-y="-3.205" cx="561.2780262090484" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1" data-x="-1.8549999999999995" data-y="-2.1049999999999995" cx="287.20626333853363" cy="636.4430577223088" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.8549999999999995" data-y="-3.205" cx="287.20626333853363" cy="760" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.1" data-x="2.79445535" data-y="-0.76" cx="809.4539781591263" cy="485.36661466458656" r="3" fill="black"/></g><g><circle data-type="point" data-label="D1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="2.79445535" data-y="-1.84" cx="809.4539781591263" cy="606.6770670826833" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="2.79445535" data-y="1.6400000000000001" cx="809.4539781591263" cy="215.78783151326053" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2" data-x="2.79445535" data-y="0.54" cx="809.4539781591263" cy="339.34477379095165" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="800" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="1000" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '1000');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '800');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":112.32449297971918,"c":0,"e":495.5681978159127,"b":0,"d":-112.32449297971918,"f":400};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>