ta-x="-1.15" data-y="0.09999999999999987" cx="164.3989178823132" cy="449.41830762804506" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="1.15" data-y="0.30000000000000004" cx="453.01382826189365" cy="424.32135889938587" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="1.15" data-y="0.10000000000000009" cx="453.01382826189365" cy="449.41830762804506" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="1.15" data-y="-0.09999999999999998" cx="453.01382826189365" cy="474.51525635670424" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.149851500000001" data-y="2.3031271999999996" cx="164.41755236674413" cy="172.95945572247297" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.150148499999999" data-y="3.3626939" cx="164.38028339788232" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="0.22652009999999834" data-y="3.3626939" cx="337.131189750657" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="0.22652009999999823" data-y="2.7626939000000004" cx="337.1311897506569" cy="115.29084618597744" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.466520099999998" data-y="3.3626939" cx="492.73227186834373" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="1.466520099999998" data-y="2.7626939000000004" cx="492.73227186834373" cy="115.29084618597744" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":125.48474364329583,"c":0,"e":308.7063730721034,"b":0,"d":-125.48474364329583,"f":461.96678199237465};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>