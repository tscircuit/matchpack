10000000000000009" cx="320.9621837061141" cy="493.3289313739014" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.11" data-x="-1.15" data-y="0.09999999999999987" cx="320.9621837061141" cy="471.99471764868167" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="1.15" data-y="0.30000000000000004" cx="566.305641546141" cy="450.66050392346193" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="1.15" data-y="0.10000000000000009" cx="566.305641546141" cy="471.9947176486816" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="1.15" data-y="-0.09999999999999998" cx="566.305641546141" cy="493.32893137390136" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.911371599999999" data-y="-0.5297833500000002" cx="133.07479288645305" cy="539.174380596106" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.911668599999997" data-y="0.5297833500000002" cx="133.0431115790713" cy="426.1492684264771" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.7749999999999995" data-y="2.33978335" cx="147.62169718870388" cy="233.07463421323854" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.7749999999999995" data-y="1.73978335" cx="147.62169718870388" cy="297.07727538889776" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.2788400333333323" data-y="4.14978335" cx="200.54761104252674" cy="40" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.2788400333333323" data-y="3.54978335" cx="200.54761104252674" cy="104.00264117565916" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":106.67106862609864,"c":0,"e":443.63391262612754,"b":0,"d":-106.67106862609864,"f":482.6618245112915};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>