ity_net7)" data-x="1.15" data-y="-0.5" cx="600" cy="359.4475083418096" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.10 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-1.15" data-y="-0.10000000000000009" cx="418.54146162767574" cy="327.88950166836196" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.11" data-x="-1.15" data-y="0.09999999999999987" cx="418.54146162767574" cy="312.1104983316381" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.12 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net3)" data-x="1.15" data-y="0.30000000000000004" cx="600" cy="296.33149499491424" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.13 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net4)" data-x="1.15" data-y="0.10000000000000009" cx="600" cy="312.11049833163804" r="3" fill="black"/></g><g><circle data-type="point" data-label="U1.14 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net5)" data-x="1.15" data-y="-0.09999999999999998" cx="600" cy="327.8895016683619" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-5.3913716" data-y="-0.7595667000000006" cx="83.91837848424677" cy="379.92602746882164" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-5.391668599999998" data-y="0.2999999999999998" cx="83.89494666429192" cy="296.33149499491424" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-4.015000000000001" data-y="0.2999999999999998" cx="192.50723882910648" cy="296.33149499491424" r="3" fill="black"/></g><g><circle data-type="point" data-label="C2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-4.015000000000001" data-y="-0.30000000000000016" cx="192.50723882910648" cy="343.66850500508576" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.1 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-2.7750000000000004" data-y="0.2999999999999998" cx="290.3370595167944" cy="296.33149499491424" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="-2.7750000000000004" data-y="-0.30000000000000016" cx="290.3370595167944" cy="343.66850500508576" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":78.89501668361926,"c":0,"e":509.2707308138379,"b":0,"d":-78.89501668361926,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>