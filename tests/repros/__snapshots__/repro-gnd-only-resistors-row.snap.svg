<svg width="900" height="360" viewBox="0 0 900 360" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="-3.0675,-1.205 -1.0225,-1.205" data-type="line" data-label="" points="89.634670487106,215.243553008596 329.87822349570195,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-3.0675,-1.205 1.0225000000000004,-1.205" data-type="line" data-label="" points="89.634670487106,215.243553008596 570.1217765042979,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-3.0675,-1.205 3.0675000000000003,-1.205" data-type="line" data-label="" points="89.634670487106,215.243553008596 810.3653295128939,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-1.0225,-1.205 1.0225000000000004,-1.205" data-type="line" data-label="" points="329.87822349570195,215.243553008596 570.1217765042979,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="-1.0225,-1.205 3.0675000000000003,-1.205" data-type="line" data-label="" points="329.87822349570195,215.243553008596 810.3653295128939,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="1.0225000000000004,-1.205 3.0675000000000003,-1.205" data-type="line" data-label="" points="570.1217765042979,215.243553008596 810.3653295128939,215.243553008596" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><rect data-type="rect" data-label="R1" data-x="-3.0675" data-y="-0.905" x="40" y="144.756446991404" width="99.26934097421201" height="70.48710601719199" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00851219512195122"/></g><g><rect data-type="rect" data-label="R2" data-x="-1.0225" data-y="-0.905" x="280.243553008596" y="144.756446991404" width="99.26934097421196" height="70.48710601719199" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00851219512195122"/></g><g><rect data-type="rect" data-label="R3" data-x="1.0225000000000004" data-y="-0.905" x="520.487106017192" y="144.756446991404" width="99.26934097421201" height="70.48710601719199" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00851219512195122"/></g><g><rect data-type="rect" data-label="R4" data-x="3.0675000000000003" data-y="-0.905" x="760.7306590257879" y="144.756446991404" width="99.26934097421213" height="70.48710601719199" fill="rgba(16, 185, 129, 0.18)" stroke="none" stroke-width="0.00851219512195122"/></g><text data-type="text" data-label="R1" data-x="-3.0675" data-y="-0.905" x="89.634670487106" y="180" fill="black" font-size="15.507163323782235" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R1</text><text data-type="text" data-label="R2" data-x="-1.0225" data-y="-0.905" x="329.87822349570195" y="180" fill="black" font-size="15.507163323782235" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R2</text><text data-type="text" data-label="R3" data-x="1.0225000000000004" data-y="-0.905" x="570.1217765042979" y="180" fill="black" font-size="15.507163323782235" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R3</text><text data-type="text" data-label="R4" data-x="3.0675000000000003" data-y="-0.905" x="810.3653295128939" y="180" fill="black" font-size="15.507163323782235" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">R4</text><g><circle data-type="point" data-label="R1.1" data-x="-3.0675" data-y="-0.605" cx="89.634670487106" cy="144.756446991404" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-3.0675" data-y="-1.205" cx="89.634670487106" cy="215.243553008596" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="-1.0225" data-y="-0.605" cx="329.87822349570195" cy="144.756446991404" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="-1.0225" data-y="-1.205" cx="329.87822349570195" cy="215.243553008596" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="1.0225000000000004" data-y="-0.605" cx="570.1217765042979" cy="144.756446991404" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="1.0225000000000004" data-y="-1.205" cx="570.1217765042979" cy="215.243553008596" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.1" data-x="3.0675000000000003" data-y="-0.605" cx="810.3653295128939" cy="144.756446991404" r="3" fill="black"/></g><g><circle data-type="point" data-label="R4.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net0)" data-x="3.0675000000000003" data-y="-1.205" cx="810.3653295128939" cy="215.243553008596" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="360" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="900" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '900');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '360');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":117.47851002865329,"c":0,"e":449.99999999999994,"b":0,"d":-117.47851002865329,"f":73.68194842406876};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>