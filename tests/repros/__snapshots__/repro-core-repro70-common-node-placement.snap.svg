<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="white"/><g><polyline data-points="1.0200000000000011,2.2500000000000004 2.460000000000001,2.2500000000000004" data-type="line" data-label="" points="361.80327868852464,363.9344262295082 515.2459016393443,363.9344262295082" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1px"/></g><g><polyline data-points="8.881784197001252e-16,2.85 1.0200000000000011,2.85" data-type="line" data-label="" points="253.11475409836063,300 361.80327868852464,300" fill="none" stroke="black" stroke-width="1px"/></g><g><polyline data-points="1.0200000000000011,2.85 2.460000000000001,2.85" data-type="line" data-label="" points="361.80327868852464,300 515.2459016393443,300" fill="none" stroke="black" stroke-width="1px"/></g><g><rect data-type="rect" data-label="C1" data-x="1.0200000000000011" data-y="2.5500000000000003" x="317.04918032786895" y="300" width="89.50819672131144" height="63.934426229508176" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.009384615384615384"/></g><g><rect data-type="rect" data-label="C3" data-x="2.460000000000001" data-y="2.5500000000000003" x="470.49180327868856" y="300" width="89.50819672131149" height="63.934426229508176" fill="rgba(59, 130, 246, 0.18)" stroke="none" stroke-width="0.009384615384615384"/></g><g><rect data-type="rect" data-label="FB1" data-x="-0.9999999999999991" data-y="2.85" x="82.62295081967213" y="236.0655737704918" width="127.86885245901641" height="127.86885245901641" fill="rgba(59, 130, 246, 0.12)" stroke="none" stroke-width="0.009384615384615384"/></g><text data-type="text" data-label="C1" data-x="1.0200000000000011" data-y="2.5500000000000003" x="361.80327868852464" y="331.9672131147541" fill="black" font-size="14.065573770491804" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C1</text><text data-type="text" data-label="C3" data-x="2.460000000000001" data-y="2.5500000000000003" x="515.2459016393443" y="331.9672131147541" fill="black" font-size="14.065573770491804" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">C3</text><text data-type="text" data-label="FB1" data-x="-0.9999999999999991" data-y="2.85" x="146.55737704918033" y="300" fill="black" font-size="28.131147540983616" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">FB1</text><g><circle data-type="point" data-label="C1.1" data-x="1.0200000000000011" data-y="2.85" cx="361.80327868852464" cy="300" r="3" fill="black"/></g><g><circle data-type="point" data-label="C1.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="1.0200000000000011" data-y="2.2500000000000004" cx="361.80327868852464" cy="363.9344262295082" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.1" data-x="2.460000000000001" data-y="2.85" cx="515.2459016393443" cy="300" r="3" fill="black"/></g><g><circle data-type="point" data-label="C3.2 (unnamedsubcircuitsubcircuit_source_group_0_connectivity_net1)" data-x="2.460000000000001" data-y="2.2500000000000004" cx="515.2459016393443" cy="363.9344262295082" r="3" fill="black"/></g><g><circle data-type="point" data-label="FB1.1" data-x="-1.9999999999999991" data-y="2.85" cx="39.99999999999997" cy="300" r="3" fill="black"/></g><g><circle data-type="point" data-label="FB1.2" data-x="8.881784197001252e-16" data-y="2.85" cx="253.11475409836063" cy="300" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":106.55737704918033,"c":0,"e":253.11475409836055,"b":0,"d":-106.55737704918033,"f":603.688524590164};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>