a-label="R1.1" data-x="2.9894553499999996" data-y="-2.45" cx="484.96039196721307" cy="466.2295081967213" r="3" fill="black"/></g><g><circle data-type="point" data-label="R1.2 (charger_connectivity_net0)" data-x="2.9894553499999996" data-y="-3.5500000000000007" cx="484.96039196721307" cy="560" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.1" data-x="3.2" data-y="1.15" cx="502.9084604918033" cy="159.34426229508205" r="3" fill="black"/></g><g><circle data-type="point" data-label="R2.2 (charger_connectivity_net0)" data-x="3.2" data-y="0.04999999999999993" cx="502.9084604918033" cy="253.1147540983607" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.1" data-x="3.2" data-y="-0.6500000000000001" cx="502.9084604918033" cy="312.78688524590166" r="3" fill="black"/></g><g><circle data-type="point" data-label="R3.2 (charger_connectivity_net0)" data-x="3.2" data-y="-1.7500000000000002" cx="502.9084604918033" cy="406.55737704918033" r="3" fill="black"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="600" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="600" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '600');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '600');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":85.24590163934424,"c":0,"e":230.12157524590168,"b":0,"d":-85.24590163934424,"f":257.3770491803279};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>